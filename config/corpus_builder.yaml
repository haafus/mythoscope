
paths:
  corpus_dir: "outputs/corpus"
  download_list_file: "config/download_list.json"
  metadata_file: "corpus_metadata.json"
  catalog_file: "corpus_catalog.csv"
  processed_urls_file: "processed_urls.json"


build:
  default_type: "all"
  max_workers: 10


downloader:
  timeout_connect: 10
  timeout_read: 30
  retry_total: 4
  retry_backoff_factor: 1.5
  retry_status_forcelist: [429, 500, 502, 503, 504]


logging:
  log_file_path: "outputs/logs/corpus.log"
  max_bytes: 10485760
  backup_count: 5


parsing:
  html:
    include_comments: false
    include_tables: true
  pdf:
    extract_tables: false
    preserve_layout: true