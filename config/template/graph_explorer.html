<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Viewer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #faf9f5;
            overflow: hidden;
        }

        .header {
            background: white;
            border-bottom: 1px solid #e8e6e4;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            color: #5a524c;
            border: 1px solid #d0ccc8;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            font-weight: 500;
        }

        .back-btn:hover {
            background: #f0eeec;
            border-color: #c0bcb8;
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
        }

        .graph-info {
            border-left: 1px solid #e8e6e4;
            padding-left: 24px;
        }

        .graph-title {
            font-weight: 600;
            color: #2c2825;
            font-size: 1rem;
            display: block;
        }

        .graph-status {
            font-size: 0.75rem;
            color: #8a7f76;
            margin-top: 2px;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        .btn {
            background: white;
            border: 1px solid #d0ccc8;
            padding: 8px 18px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            color: #5a524c;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #f0eeec;
            border-color: #c0bcb8;
        }

        .btn-primary {
            background: #5a524c;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #6b635c;
        }

        .viewport {
            flex: 1;
            width: 100%;
            position: relative;
            background: #faf9f5;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .legend-card {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            padding: 12px 18px;
            border-radius: 8px;
            border: 1px solid #e8e6e4;
            font-size: 0.75rem;
            color: #5a524c;
            pointer-events: none;
            font-weight: 400;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .legend-card b {
            font-weight: 600;
            color: #2c2825;
        }
    </style>
</head>
<body style="display: flex; flex-direction: column;">

    <header class="header">
        <div class="header-left">
            <a href="graphs.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back
            </a>
            <div class="graph-info">
                <span class="graph-title" id="title-text">Loading...</span>
                <span class="graph-status">Interactive mode</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="refresh()">Refresh</button>
            <button class="btn btn-primary" onclick="toggleFullscreen()">Fullscreen</button>
        </div>
    </header>

    <main class="viewport">
        <iframe id="graph-frame" src="about:blank"></iframe>
        <div class="legend-card">
            <b>Controls:</b> Zoom with mouse wheel | drag with left mouse button | click a node for details
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const file = urlParams.get('file');
        const title = urlParams.get('title');

        const frame = document.getElementById('graph-frame');
        const titleDisplay = document.getElementById('title-text');

        if (file) {
            frame.src = file;
            titleDisplay.textContent = title || 'Untitled';
            document.title = (title || 'Graph') + ' - MythoScope';
        } else {
            titleDisplay.textContent = 'Error: no file specified';
        }

        function refresh() {
            frame.contentWindow.location.reload();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
