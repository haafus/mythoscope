<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MythoScope - Geography</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #f4f5f2;
            color: #1f2933;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .container {
            width: min(1440px, calc(100% - 40px));
            margin: 0 auto;
            padding: 24px 0 32px;
        }

        .map-frame {
            /* Ограничиваем высоту карты, чтобы она не занимала весь экран */
            height: 600px;
            max-height: 70vh;
            min-height: 400px;
            overflow: hidden;
            border: 1px solid #d8dee4;
            border-radius: 8px;
            background: #dce7ed;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        #geography-map {
            width: 100%;
            height: 100%;
        }

        .map-point {
            display: block;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-radius: 50%;
            background: var(--point-color, #334155);
            box-shadow: 0 2px 9px rgba(15, 23, 42, 0.28);
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }

        .map-point:hover,
        .leaflet-marker-icon:focus-within .map-point {
            transform: scale(1.25);
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.34);
        }

        .tradition-popup .leaflet-popup-content-wrapper {
            border-radius: 8px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.18);
        }

        .tradition-popup .leaflet-popup-content {
            width: min(320px, 72vw);
            margin: 16px;
        }

        .popup-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: #111827;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.25;
        }

        .popup-color {
            width: 14px;
            height: 14px;
            border: 2px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 1px rgba(17, 24, 39, 0.2);
            flex: 0 0 auto;
        }

        .popup-description {
            color: #374151;
            font-size: 13px;
            line-height: 1.5;
        }

        .popup-books-title {
            margin: 14px 0 7px;
            color: #111827;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .popup-books {
            display: grid;
            gap: 6px;
            list-style: none;
        }

        .popup-books li {
            padding: 7px 8px;
            border: 1px solid #e0e5ea;
            border-radius: 6px;
            background: #f8fafb;
            color: #374151;
            overflow-wrap: anywhere;
            font-size: 13px;
        }

        .map-error {
            display: grid;
            place-items: center;
            height: 100%;
            padding: 24px;
            color: #9a3412;
            text-align: center;
            font-size: 14px;
        }

        @media (max-width: 760px) {
            .container {
                width: min(100% - 24px, 1440px);
                padding: 14px 0 20px;
            }

            .map-frame {
                /* Делаем карту чуть компактнее на мобильных */
                height: 480px;
                max-height: 60vh;
                min-height: 360px;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="map-frame">
            <div id="geography-map"></div>
        </div>
    </main>

    <script>
        const DATA_URLS = [
            '/corpus/traditions_info.json',
            '/corpus_chunked/traditions_info.json'
        ];

        function escapeHtml(value) {
            const div = document.createElement('div');
            div.textContent = String(value ?? '');
            return div.innerHTML;
        }

        function isValidColor(value) {
            return typeof value === 'string' && /^#[0-9a-f]{6}$/i.test(value.trim());
        }

        function normalizeCoordinates(value) {
            if (!Array.isArray(value) || value.length < 2) return null;

            const lat = Number(value[0]);
            const lon = Number(value[1]);

            if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
            if (lat < -90 || lat > 90 || lon < -180 || lon > 180) return null;

            return [lat, lon];
        }

        function normalizeTraditions(raw) {
            return Object.entries(raw || {})
                .map(([name, info]) => {
                    const coordinates = normalizeCoordinates(info && info.coordinates);
                    if (!coordinates) return null;

                    return {
                        name,
                        description: info.description || '',
                        coordinates,
                        color: isValidColor(info.color) ? info.color : '#334155',
                        books: Array.isArray(info.books) ? info.books.filter(Boolean) : []
                    };
                })
                .filter(Boolean)
                .sort((a, b) => a.name.localeCompare(b.name));
        }

        async function fetchTraditions() {
            let lastError = null;

            for (const url of DATA_URLS) {
                try {
                    const response = await fetch(url, { cache: 'no-store' });
                    if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
                    return normalizeTraditions(await response.json());
                } catch (error) {
                    lastError = error;
                }
            }

            throw lastError || new Error('Data file was not found');
        }

        function buildCoordinateGroups(traditions) {
            const groups = new Map();

            traditions.forEach(item => {
                const [lat, lon] = item.coordinates;
                const key = `${lat.toFixed(4)},${lon.toFixed(4)}`;
                if (!groups.has(key)) groups.set(key, []);
                groups.get(key).push(item);
            });

            return groups;
        }

        function getOffsetCoordinate(item, index, total) {
            if (total <= 1) return item.coordinates;

            const [lat, lon] = item.coordinates;
            const angle = (Math.PI * 2 * index) / total;
            const radius = 0.8;

            return [
                lat + Math.sin(angle) * radius,
                lon + Math.cos(angle) * radius
            ];
        }

        function buildPopupHtml(item) {
            const books = item.books.length
                ? item.books.map(book => `<li>${escapeHtml(book)}</li>`).join('')
                : '<li>No books listed</li>';

            return `
                <div class="popup-title">
                    <span class="popup-color" style="background:${escapeHtml(item.color)}"></span>
                    <span>${escapeHtml(item.name)}</span>
                </div>
                <div class="popup-description">${escapeHtml(item.description)}</div>
                <div class="popup-books-title">Books</div>
                <ul class="popup-books">${books}</ul>
            `;
        }

        function createMarkerIcon(item) {
            return L.divIcon({
                className: 'tradition-marker',
                html: `<button class="map-point" type="button" style="--point-color:${escapeHtml(item.color)}" aria-label="${escapeHtml(item.name)}"></button>`,
                iconSize: [18, 18],
                iconAnchor: [9, 9],
                popupAnchor: [0, -11]
            });
        }

        function renderMarkers(map, traditions) {
            const bounds = [];
            const groups = buildCoordinateGroups(traditions);

            groups.forEach(group => {
                group.forEach((item, index) => {
                    const position = getOffsetCoordinate(item, index, group.length);

                    L.marker(position, {
                        icon: createMarkerIcon(item),
                        keyboard: true,
                        title: item.name
                    })
                        .addTo(map)
                        .bindPopup(buildPopupHtml(item), {
                            className: 'tradition-popup',
                            closeButton: true,
                            maxWidth: 340
                        });

                    bounds.push(position);
                });
            });

            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [34, 34], maxZoom: 4 });
            }
        }

        function showError(message) {
            document.getElementById('geography-map').innerHTML = `<div class="map-error">${escapeHtml(message)}</div>`;
        }

        async function initialize() {
            if (typeof L === 'undefined') {
                showError('Map library could not be loaded.');
                return;
            }

            try {
                const traditions = await fetchTraditions();

                // Устанавливаем жесткие границы карты (от полюса до полюса, от -180 до 180 градусов)
                const worldBounds = [
                    [-90, -180],
                    [90, 180]
                ];

                const map = L.map('geography-map', {
                    zoomControl: true,
                    maxBounds: worldBounds,      // Блокируем скролл за пределы мира
                    maxBoundsViscosity: 1.0      // Жестко останавливаем карту на границе
                }).setView([20, 15], 2);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 7,
                    minZoom: 3,
                    noWrap: true,                // Отключаем бесконечное дублирование карты
                    bounds: worldBounds,         // Не загружаем тайлы за пределами
                    attribution: '&copy; OpenStreetMap contributors'
                }).addTo(map);

                renderMarkers(map, traditions);
            } catch (error) {
                console.error(error);
                showError('Could not load geography data.');
            }
        }

        window.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
</html>
