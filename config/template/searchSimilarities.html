<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Similarity Search - Results</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f4f2;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .search-header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e8e6e4;
        }
        .search-form {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .search-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
        }
        .search-button {
            background: #5a524c;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .search-button:hover {
            background: #6b635c;
        }
        .model-selector {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .model-select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
            flex: 1;
            cursor: pointer;
        }
        .results-area {
            background: white;
            border-radius: 12px;
            border: 1px solid #e8e6e4;
            overflow: hidden;
        }
        .result-item {
            padding: 20px;
            border-bottom: 1px solid #e8e6e4;
            cursor: pointer;
            transition: background 0.2s;
        }
        .result-item:hover {
            background: #faf9f5;
        }
        .result-tradition {
            display: inline-block;
            background: #5a524c;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        .result-score {
            float: right;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .score-high { background: #c8e6c9; color: #2e7d32; }
        .score-medium { background: #fff3e0; color: #ef6c00; }
        .score-low { background: #ffebee; color: #c62828; }
        .result-text {
            color: #3a3532;
            line-height: 1.6;
            margin-top: 10px;
        }
        .result-text mark {
            background: #fff3c4;
            padding: 0 2px;
            border-radius: 3px;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #8a827c;
        }
        .no-results {
            text-align: center;
            padding: 60px;
            color: #8a827c;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #5a524c;
            text-decoration: none;
            padding: 8px 16px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e8e6e4;
        }
        .back-link:hover {
            background: #faf9f5;
        }
        @media (max-width: 768px) {
            .search-form { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">Back</a>

        <div class="search-header">
            <h2>🔍 Semantic Similarity Search</h2>
            <div class="search-form">
                <input type="text" class="search-input" id="searchInput" placeholder="Enter text to search..." />
                <button class="search-button" id="searchBtn">🔎 Search</button>
            </div>
            <div class="model-selector">
                <label>Model:</label>
                <select class="model-select" id="modelSelect"></select>
            </div>
        </div>

        <div class="results-area" id="resultsArea">
            <div class="loading">Enter text to search</div>
        </div>
    </div>

    <script>
        let currentModel = null;
        let currentModelsList = [];


        const urlParams = new URLSearchParams(window.location.search);
        const queryParam = urlParams.get('q');
        const modelParam = urlParams.get('model');


        async function loadModels() {
            try {

                let response = await fetch('../analysis/models.json');
                if (!response.ok) {

                    response = await fetch('/analysis/models.json');
                }

                if (response.ok) {
                    const models = await response.json();
                    currentModelsList = Array.isArray(models) ? models : [];
                    populateModelSelect(currentModelsList);
                    return;
                }


                response = await fetch('../analysis/');
                if (response.ok) {
                    const text = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(text, 'text/html');
                    const folders = Array.from(doc.querySelectorAll('a'))
                        .map(a => a.getAttribute('href'))
                        .filter(href => href && href.endsWith('/') && !href.startsWith('.'))
                        .map(href => href.replace(/\/$/, ''))
                        .filter(name => name && name !== 'analysis');

                    if (folders.length > 0) {
                        currentModelsList = folders;
                        populateModelSelect(currentModelsList);
                        return;
                    }
                }

                throw new Error('No models found');
            } catch (error) {
                console.error('Failed to load models:', error);
                const select = document.getElementById('modelSelect');
                select.innerHTML = '<option value="">Error loading models</option>';
            }
        }

        function populateModelSelect(models) {
            const select = document.getElementById('modelSelect');
            select.innerHTML = '';

            if (!models || models.length === 0) {
                select.innerHTML = '<option value="">No models found</option>';
                return;
            }

            models.forEach(model => {
                const option = document.createElement('option');
                option.value = model;
                option.textContent = model.replace(/_/g, '/');
                select.appendChild(option);
            });


            if (modelParam && models.includes(modelParam)) {
                select.value = modelParam;
            } else if (models.length > 0) {
                select.value = models[0];
            }

            currentModel = select.value;

            select.addEventListener('change', () => {
                currentModel = select.value;
                const searchText = document.getElementById('searchInput').value.trim();
                if (searchText) {
                    performSearch();
                }
            });


            if (queryParam) {
                document.getElementById('searchInput').value = decodeURIComponent(queryParam);
                performSearch();
            }
        }

        async function performSearch() {
            const searchText = document.getElementById('searchInput').value.trim();
            if (!searchText) {
                showMessage('Please enter text to search', 'warning');
                return;
            }

            if (!currentModel) {
                showMessage('Please select a model', 'warning');
                return;
            }

            const resultsArea = document.getElementById('resultsArea');
            resultsArea.innerHTML = '<div class="loading">⏳ Searching... This may take a few seconds</div>';

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(searchText)}&model=${encodeURIComponent(currentModel)}&top_k=20`);

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                displayResults(data);
            } catch (error) {
                console.error('Search error:', error);
                resultsArea.innerHTML = `<div class="no-results">
                    ❌ Search error: ${error.message}<br><br>
                    <small>Make sure the server is running and model ${currentModel} is loaded</small>
                </div>`;
            }
        }

        function showMessage(message, type = 'info') {
            const resultsArea = document.getElementById('resultsArea');
            resultsArea.innerHTML = `<div class="no-results">ℹ️ ${message}</div>`;
        }

        function displayResults(data) {
            const resultsArea = document.getElementById('resultsArea');

            if (!data.results || data.results.length === 0) {
                resultsArea.innerHTML = '<div class="no-results">😕 Nothing found. Try changing the query.</div>';
                return;
            }

            resultsArea.innerHTML = `
                <div style="padding: 15px; background: #faf9f5; border-bottom: 1px solid #e8e6e4;">
                    <strong>🔍 Found:</strong> ${data.total} results
                    <span style="float: right; font-size: 0.8rem; color: #8a827c;">
                        Model: ${escapeHtml(data.model.replace(/_/g, '/'))}
                    </span>
                </div>
                ${data.results.map((result, index) => {
                    const similarityPercent = Math.round(result.similarity_score * 100);
                    let scoreClass = 'score-low';
                    if (similarityPercent >= 60) scoreClass = 'score-high';
                    else if (similarityPercent >= 40) scoreClass = 'score-medium';

                    let highlightedText = highlightText(result.text, data.query);

                    return `
                    <div class="result-item" onclick="showPointDetails('${escapeHtml(result.id)}', '${escapeHtml(data.model)}')">
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
                            <span class="result-tradition">📚 ${escapeHtml(result.tradition)}</span>
                            <span class="result-score ${scoreClass}">${similarityPercent}% similarity</span>
                        </div>
                        <div style="font-size: 0.75rem; color: #8a827c; margin: 8px 0;">
                            ID: ${escapeHtml(result.id)} | Chunk #${result.chunk_index}
                        </div>
                        <div class="result-text">${highlightedText}</div>
                    </div>
                    `;
                }).join('')}
            `;
        }

        function showPointDetails(pointId, modelName) {

            if (window.opener && !window.opener.closed) {
                window.opener.postMessage({
                    type: 'openPointDetails',
                    id: pointId,
                    model: modelName
                }, '*');

                const notification = document.createElement('div');
                notification.textContent = '✓ Details opened in the main window';
                notification.style.cssText = 'position: fixed; bottom: 20px; right: 20px; background: #2e7d32; color: white; padding: 10px 20px; border-radius: 8px; z-index: 1000; animation: fadeOut 2s forwards;';
                document.body.appendChild(notification);
                setTimeout(() => notification.remove(), 2000);
            } else {

                alert(`Point: ${pointId}\nModel: ${modelName}\n\nDetailed information is available in the main embedding analysis window.`);

                if (window.opener) {
                    window.opener.focus();
                }
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function highlightText(text, query) {
            if (!query || !text) return escapeHtml(text);
            const words = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);
            let escapedText = escapeHtml(text);
            words.forEach(word => {
                try {
                    const regex = new RegExp('(' + escapeRegex(word) + ')', 'gi');
                    escapedText = escapedText.replace(regex, '<mark>$1</mark>');
                } catch (e) {

                }
            });
            return escapedText;
        }


        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                0% { opacity: 1; }
                70% { opacity: 1; }
                100% { opacity: 0; visibility: hidden; }
            }
        `;
        document.head.appendChild(style);


        document.getElementById('searchBtn').addEventListener('click', performSearch);
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        loadModels();
    </script>
</body>
</html>
