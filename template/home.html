<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MythoScope</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #faf9f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .center-image {
            max-width: 60%;
            height: auto;
            margin-bottom: 50px;
            border-radius: 12px;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            height: 100vh;
            background: #ffffff;
            box-shadow: 4px 0 20px rgba(0,0,0,0.08);
            transition: left 0.3s ease;
            z-index: 1000;
            padding: 24px;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-toggle {
            position: fixed;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            background: #5a524c;
            color: #fff;
            border: none;
            padding: 15px 12px;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            font-size: 1.2rem;
            z-index: 1001;
            transition: all 0.2s ease;
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        .sidebar-toggle:hover {
            background: #6b635c;
            padding-left: 18px;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e8e6e1;
        }

        .sidebar-title {
            font-size: 1.1rem;
            color: #5a524c;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #5a524c;
            cursor: pointer;
            padding: 5px;
            transition: transform 0.2s;
        }

        .close-btn:hover {
            transform: rotate(90deg);
        }

        .menu-section {
            margin-bottom: 12px;
        }

        .menu-btn {
            width: 100%;
            background: transparent;
            color: #5a524c;
            border: none;
            padding: 12px 0;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-btn:hover {
            color: #8b837c;
            padding-left: 8px;
        }

        .menu-btn .arrow {
            transition: transform 0.3s ease;
            font-size: 0.8rem;
        }

        .menu-btn.active .arrow {
            transform: rotate(180deg);
        }

        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            padding-left: 16px;
        }

        .submenu.open {
            max-height: 200px;
        }

        .submenu-item {
            display: block;
            padding: 10px 0;
            color: #7a726c;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .submenu-item:hover {
            color: #5a524c;
            padding-left: 8px;
        }

        .simple-menu-btn {
            width: 100%;
            background: transparent;
            color: #5a524c;
            border: none;
            padding: 12px 0;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .simple-menu-btn:hover {
            color: #8b837c;
            padding-left: 8px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 999;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 280px;
                left: -280px;
            }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>

    <div class="container" id="mainContainer">
        <img src="Logo.jpg" alt="Картинка" class="center-image">
    </div>

    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
        ☰ Меню
    </button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Навигация</span>
            <button class="close-btn" onclick="toggleSidebar()">×</button>
        </div>

        <div class="menu-section">
            <button class="simple-menu-btn" onclick="window.location.href='corpus.html'">
                Корпус
            </button>
        </div>

        <div class="menu-section">
            <button class="simple-menu-btn" onclick="window.location.href='analysis.html'">
                Представление
            </button>
        </div>

        <div class="menu-section">
            <button class="menu-btn" onclick="toggleSubmenu('modelsSubmenu', this)">
                Модели
                <span class="arrow">▼</span>
            </button>
            <div class="submenu" id="modelsSubmenu">
                <a href="models_list.html" class="submenu-item">Информация о моделях</a>
                <a href="models_accuracy.html" class="submenu-item">Сравнение точности</a>
            </div>
        </div>

        <div class="menu-section">
            <button class="simple-menu-btn" onclick="window.location.href='graphs.html'">
                Графы
            </button>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const toggleBtn = document.getElementById('sidebarToggle');

            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');

            if (sidebar.classList.contains('open')) {
                toggleBtn.style.opacity = '0';
                toggleBtn.style.pointerEvents = 'none';
            } else {
                toggleBtn.style.opacity = '1';
                toggleBtn.style.pointerEvents = 'auto';
            }
        }

        function toggleSubmenu(submenuId, btn) {
            const submenu = document.getElementById(submenuId);
            submenu.classList.toggle('open');
            btn.classList.toggle('active');
        }

        document.getElementById('overlay').addEventListener('click', toggleSidebar);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const sidebar = document.getElementById('sidebar');
                if (sidebar.classList.contains('open')) {
                    toggleSidebar();
                }
            }
        });
    </script>
</body>
</html>
