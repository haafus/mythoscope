<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интерфейс</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #faf9f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .center-image {
            max-width: 60%;
            height: auto;
            margin-bottom: 50px;
            border-radius: 12px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .tooltip-container {
            position: relative;
        }

        .btn-elegant {
            background: #5a524c;
            color: #fff;
            border: none;
            padding: 14px 36px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            min-width: 160px;
            letter-spacing: 0.3px;
        }

        .btn-elegant:hover {
            background: #6b635c;
            transform: translateY(-2px);
        }

        .btn-elegant:active {
            transform: translateY(0);
        }

        .tooltip {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            background: #5a524c;
            color: #fff;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }

        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #5a524c;
        }

        .tooltip-container:hover .tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Logo.jpg" alt="Картинка" class="center-image">

        <div class="buttons">
            <div class="tooltip-container">
                <button type="button" class="btn-elegant" onclick="window.location.href='corpus.html'">
                    Корпус
                </button>
                <span class="tooltip">Перейти к корпусу текстов</span>
            </div>

            <div class="tooltip-container">
                <button type="button" class="btn-elegant" onclick="window.location.href='analysis.html'">
                    Представление
                </button>
                <span class="tooltip">Открыть визуализацию данных</span>
            </div>
        </div>
    </div>
</body>
</html>
