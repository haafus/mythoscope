<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MythoScope - Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #faf9f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 28px;
        }

        .header-container {
            text-align: center;
            margin-bottom: 28px;
        }


        .logo-image {
            max-width: 250px;
            height: auto;
            margin-bottom: 22px;
        }


        .nav-menu {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 15px;
            color: #333;
        }

        .nav-item {
            padding: 8px 16px;
            cursor: pointer;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: inherit;
            color: #333;
            border-radius: 4px;
            transition: background-color 0.2s ease;
        }

        .nav-item.active {
            background-color: #e8f0f6;
            font-weight: 600;
        }

        .separator {
            color: #d0d0d0;
            font-size: 14px;
        }

        /* Контейнер для текста */
        .content-container {
            max-width: 960px;
            width: calc(100% - 32px);
            padding: 40px;
            text-align: center;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        .tab-content {
            display: none;
            color: #555;
            font-size: 18px;
            line-height: 1.6;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <img src="Logo.jpg" alt="MythoScope Logo" class="logo-image">

        <nav class="nav-menu">
            <button class="nav-item active" onclick="openTab('vision', this)">Vision</button>
            <span class="separator">|</span>
            <button class="nav-item" onclick="openTab('methodology', this)">Methodology</button>
            <span class="separator">|</span>
            <button class="nav-item" onclick="openTab('contribute', this)">Contribute</button>
            <span class="separator">|</span>
            <button class="nav-item" onclick="openTab('resources', this)">Resources</button>
        </nav>
    </div>

    <div class="content-container">
        <div id="vision" class="tab-content active">insert your text</div>
        <div id="methodology" class="tab-content">insert your text</div>
        <div id="contribute" class="tab-content">insert your text</div>
        <div id="resources" class="tab-content">insert your text</div>
    </div>

    <script>
        function openTab(tabId, element) {
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.classList.remove('active'));

            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }
    </script>
</body>
</html>
