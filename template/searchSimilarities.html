<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поиск соответствий</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #faf9f7;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #e8e6e4;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h2 {
            color: #3a3532;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        p {
            color: #666;
            font-size: 1rem;
            line-height: 1.5;
        }

        .close-btn {
            margin-top: 24px;
            background: #5a524c;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background: #6b635c;
        }
    </style>
</head>
<body>
    <div class="modal-content">
        <h2>In Development</h2>
        <p>Функция поиска соответствий находится в разработке</p>
        <button class="close-btn" onclick="window.close()">Закрыть</button>
    </div>
</body>
</html>
