<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Графы</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #faf9f5;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            color: #5a524c;
            border: 1px solid #d0ccc8;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            font-weight: 500;
        }

        .back-btn:hover {
            background: #f0eeec;
            border-color: #c0bcb8;
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
        }

        h1 {
            color: #2c2825;
            margin-bottom: 0;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .table-wrapper {
            background: white;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e8e6e4;
            overflow-x: auto;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .graphs-table {
            width: 100%;
            border-collapse: collapse;
        }

        .graphs-table thead th {
            background: #f5f4f3;
            color: #3a3532;
            font-weight: 600;
            padding: 14px 16px;
            border-bottom: 2px solid #e0dedc;
            text-align: left;
            font-size: 0.8rem;
            letter-spacing: 0.03em;
        }

        .graphs-table tbody td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0eeec;
            color: #4a4542;
            vertical-align: middle;
        }

        .graphs-table tbody tr {
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .graphs-table tbody tr:hover {
            background-color: #faf9f5;
        }

        .graphs-table tbody tr:last-child td {
            border-bottom: none;
        }

        .file-name {
            font-weight: 500;
            color: #2c2825;
            font-size: 0.95rem;
        }

        .file-meta {
            font-size: 0.75rem;
            color: #8a7f76;
            margin-top: 4px;
        }

        .btn-open {
            background: #5a524c;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-open:hover {
            background: #6b635c;
        }

        .btn-open svg {
            width: 14px;
            height: 14px;
        }

        .empty-message {
            text-align: center;
            padding: 48px 20px;
            color: #8a7f76;
            font-size: 0.9rem;
        }

        @media (max-width: 680px) {
            body {
                padding: 20px 16px;
            }
            .table-wrapper {
                padding: 16px;
            }
            .graphs-table thead th,
            .graphs-table tbody td {
                padding: 12px 12px;
            }
            .btn-open {
                padding: 4px 12px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <a href="home.html" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Назад
        </a>
        <h1>Графы анализа</h1>
        <div style="width: 90px;"></div>
    </div>

    <div class="table-wrapper">
        <table class="graphs-table" id="graphsTable">
            <thead>
                <tr>
                    <th>Название файла</th>
                    <th style="width: 120px; text-align: right;">Действие</th>
                </tr>
            </thead>
            <tbody id="graphTableBody">
                <tr class="empty-row">
                    <td colspan="2" class="empty-message">Загрузка файлов...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    async function loadGraphs() {
        const tbody = document.getElementById('graphTableBody');
        try {
            const response = await fetch('scan_graph.php');
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const files = await response.json();

            if (!files || files.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" class="empty-message">Файлы графов не найдены. Загрузите HTML или изображения в папку /graphs</td></tr>';
                return;
            }

            const supportedExtensions = ['html', 'htm', 'png', 'jpg', 'jpeg', 'svg', 'gif'];
            const graphFiles = files.filter(file => {
                const ext = file.split('.').pop().toLowerCase();
                return supportedExtensions.includes(ext);
            });

            if (graphFiles.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" class="empty-message">Нет файлов графов (HTML/PNG/JPG/SVG). Добавьте их в директорию graphs.</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            graphFiles.forEach(file => {
                const ext = file.split('.').pop().toLowerCase();
                let baseName = file.replace(/\.[^/.]+$/, "");
                let displayTitle = baseName.replace(/[-_]/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                if (displayTitle.length > 45) displayTitle = displayTitle.slice(0, 42) + '...';
                const fullPath = `../graphs/${file}`;
                const isHtml = (ext === 'html' || ext === 'htm');

                const tr = document.createElement('tr');
                tr.className = 'graph-row';

                tr.innerHTML = `
                    <td>
                        <div class="file-name">${escapeHtml(displayTitle)}</div>
                        <div class="file-meta">${escapeHtml(file)}</div>
                    </td>
                    <td style="text-align: right;">
                        <button class="btn-open" data-path="${escapeAttr(fullPath)}" data-title="${escapeAttr(displayTitle)}" data-ishtml="${isHtml}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                <polyline points="15 3 21 3 21 9"></polyline>
                                <line x1="10" y1="14" x2="21" y2="3"></line>
                            </svg>
                            Открыть
                        </button>
                    </td>
                `;

                tr.addEventListener('click', (e) => {
                    if (e.target.closest('.btn-open')) return;
                    openGraphWindow(fullPath, displayTitle, isHtml);
                });

                const btn = tr.querySelector('.btn-open');
                if (btn) {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const path = btn.getAttribute('data-path');
                        const title = btn.getAttribute('data-title');
                        const isHtmlFlag = btn.getAttribute('data-ishtml') === 'true';
                        openGraphWindow(path, title, isHtmlFlag);
                    });
                }

                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error('Ошибка загрузки графов:', error);
            tbody.innerHTML = `<tr><td colspan="2" class="empty-message" style="color: #b33;">Ошибка подключения: ${error.message}. Убедитесь, что scan_graph.php доступен.</td></tr>`;
        }
    }

    function openGraphWindow(filePath, title, isHtml) {
        let targetUrl;
        if (isHtml) {
            targetUrl = `graph_explorer.html?file=${encodeURIComponent(filePath)}&title=${encodeURIComponent(title)}`;
        } else {
            targetUrl = `graph_view.html?img=${encodeURIComponent(filePath)}&title=${encodeURIComponent(title)}`;
        }
        window.open(targetUrl, '_blank');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function escapeAttr(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    loadGraphs();
</script>
</body>
</html>
