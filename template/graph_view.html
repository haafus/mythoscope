<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр изображения</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #faf9f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .nav {
            background: white;
            border-bottom: 1px solid #e8e6e4;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-shrink: 0;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            color: #5a524c;
            border: 1px solid #d0ccc8;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            font-weight: 500;
        }

        .back-btn:hover {
            background: #f0eeec;
            border-color: #c0bcb8;
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
        }

        .title {
            flex: 1;
            text-align: center;
            color: #2c2825;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: -0.01em;
        }

        .download-btn {
            background: #5a524c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .download-btn:hover {
            background: #6b635c;
        }

        .viewer {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            cursor: grab;
            overflow: hidden;
        }

        .viewer:active {
            cursor: grabbing;
        }

        #img {
            max-width: 95%;
            max-height: 90%;
            transition: transform 0.1s ease-out;
            user-select: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="nav">
    <a href="graphs.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Назад
    </a>
    <div class="title" id="title-text">Загрузка...</div>
    <a id="download-link" href="#" download class="download-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Скачать
    </a>
</div>

<div class="viewer" id="viewer">
    <img id="img" src="" alt="Graph">
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const imagePath = params.get('img');
    const title = params.get('title');

    if (imagePath) {
        const imgEl = document.getElementById('img');
        const titleEl = document.getElementById('title-text');
        const downloadLink = document.getElementById('download-link');

        imgEl.src = imagePath;
        titleEl.textContent = title || 'Изображение графа';
        downloadLink.href = imagePath;
        document.title = (title || 'Изображение') + ' - MythoScope';

        let scale = 1;
        const viewer = document.getElementById('viewer');

        viewer.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            scale = Math.min(Math.max(0.5, scale + delta), 4);
            imgEl.style.transform = `scale(${scale})`;
        });
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            window.location.href = 'graphs.html';
        }
    });
</script>
</body>
</html>
