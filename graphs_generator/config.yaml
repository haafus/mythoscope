llm:
  mode: "local"

  api:
    api_key: "sk-YOUR_OPENAI_OR_OTHER_SERVER_KEY"
    model_name: "gpt-4o-mini"
    base_url: "https://api.openai.com/v1"
    use_json_mode: true

  local:
    api_key: "dummy-key"
    model_name: "google/gemma-4-e4b"
    base_url: "http://127.0.0.1:1234/v1/"
    use_json_mode: false

processing:
  chunk_size: 4000
  chunk_overlap: 1000

paths:
  metadata: "corpus/corpus_metadata.json"
  prompts: "graphs_generator/prompts.txt"
  output_base_dir: "graphs"
  logs_dir: "logs"

execution:
  force_overwrite: false
