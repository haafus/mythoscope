paths:
  corpus_dir: "corpus"
  out_dir: "analysis"
  chroma_path: "./chroma_db"
  cache_dir: "./cache"

embedding:
  default_model: "BAAI/bge-m3"
  default_chunking: "paragraph"
  text_type: "both"  # original, translate, both
  batch_size: 32
  clear_existing: true

chunking:
  character:
    chunk_size: 512
    chunk_overlap: 64
  sentence:
    chunk_size: 512
    chunk_overlap: 64
  paragraph:
    chunk_size: 1024
    chunk_overlap: 128

logging:
  level: "INFO"
  file: "logs/embedding.log"
  max_bytes: 10485760  # 10 MB
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

performance:
  enable_metrics: true
  track_memory: true
  metrics_file: "analysis/performance_metrics.json"

cache:
  validation: "crc32"  # crc32, md5, or none
  max_size_mb: 1024  #MB
  ttl_days: 30