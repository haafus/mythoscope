cestor kept a deer. He used to tie the divine symbols\nto its horns. Then the deer would go to the mountains, ..."],["ainu_folk_tales","ainu_folk_tales",191,"There was a festival at a neighbouring village. So the man who kept the\ndeer went off thither to the festival with all his followers. Only his\nwife was left behind with the deer. Then a man called Tun..."],["ainu_folk_tales","ainu_folk_tales",192,"useless to go on fighting alone. For this reason he ran away. Having run\naway, he got home. Having got home, he came to his house. Then he\ninvoked the aid of all the neighbourhood. He invoked the aid ..."],["ainu_folk_tales","ainu_folk_tales",193,"liv.--_Dreams._\n\nTo dream of rice-beer, a river, swimming, or anything connected with\nliquids, causes rainy weather. For instance, I dreamt last night that I\nwas drinking rice-beer, and accordingly it..."],["ainu_folk_tales","ainu_folk_tales",194,"When a man is about to start off hunting, it is very lucky for him to\ndream of meeting a god in the mountains, to whom he gives presents, and\nto whom he makes obeisance. After such a dream, he is cert..."]],"hovertemplate":"\u003cb\u003e%{customdata[1]}\u003c\u002fb\u003e\u003cbr\u003eID: %{customdata[0]}\u003cbr\u003eChunk: %{customdata[2]}\u003cbr\u003eText: %{customdata[3]}\u003cextra\u003e\u003c\u002fextra\u003e","marker":{"color":"#636EFA","line":{"color":"white","width":1},"opacity":0.7,"size":8},"mode":"markers","name":"ainu_folk_tales","x":{"dtype":"f8","bdata":"U9eXXlgC\u002fb8BxIgBcRH5PysmmncKZvs\u002fXt+n1jq\u002f9T\u002fBP6C13YAbQImLalQ42Pg\u002fG6L0aiGo7D+aANZq4hoQQIE0dSgkQto\u002fG6Qx9z6z+b\u002fqUFE97\u002f8QwG2chKaLfgpAJ741MwR23j9NeMV7xv0RwLHQfZxxDwBATxKw3t9Y6r\u002fShm5h0CTzP5xlAFPZBM+\u002f4GHJbTVoDEAxDh1hPi7Ov8Lephv9YhFAutue2BOpC0CmguzLJtzdvyKxZIUf+RLAfKvh\u002fr2qD0DE3SfVdZgBQJqNKwdH7PQ\u002fiGq5tWvx9z+P+QuWYu8MwDE\u002fu4upoSBADWnCFiddDcDy6BFsV270P2CokUFxAve\u002fuQ0pPZE\u002fHMD5tZG8oJIawF99WiXl9Q7AWSRmjJBlAsAS0wzwKkbIv8f6KIYGohLAGxomPUhSFsBN1q8dnHfh 0 cubits\n(50 feet) long. In the East the deceased saw the Morning Star, and..."],["egyptian_book_of_the_dead","egyptian_book_of_the_dead",80,"contains a prayer to the Four Holy Apes, Chapter CXXVII a hymn to\nthe gods of the \"Circles\" in the Tuat, and Chapter CXXVIII a hymn to\nOsiris. Chapters CXXX and CXXXI secured for the deceased the use ..."],["egyptian_book_of_the_dead","egyptian_book_of_the_dead",81,"Chapters CXLIV and CXLVII deal with the Seven Great Halls (Arit) of\nthe Kingdom of Osiris. The gate of each Hall was guarded by a porter,\na watchman, and a messenger; the first kept the door, the seco..."],["egyptian_book_of_the_dead","egyptian_book_of_the_dead",82,"texts that were necessary for the protection of both the chamber and\nthe mummy in it. Chapter CLII provided a house for the deceased in\nthe Celestial Anu, and Chapter *CLIII-A and *CLIII-B enabled his..."],["egyptian_book_of_the_dead","egyptian_book_of_the_dead",83,"E. A. Wallis Budge.\n\nDepartment of Egyptian and Assyrian Antiquities, British Museum.\n\nApril 15, 1920.\n\nNote.\n\nThe Trustees of the British Museum have published:--\n\n1. Coloured facsimile of the Papyru..."],["egyptian_book_of_the_dead","egyptian_book_of_the_dead",84,"Nos. 1-5 are bound in one volume, price £2 10s.\n\n6. Collotype reproduction of the Papyrus of Queen Nesi-ta-nebt-ashru,\nwith full descriptions of the vignettes, translations, and\nintroduction, containi..."]],"hovertemplate":"\u003cb\u003e%{customdata[1]}\u003c\u002fb\u003e\u003cbr\u003eID: %{customdata[0]}\u003cbr\u003eChunk: %{customdata[2]}\u003cbr\u003eText: %{customdata[3]}\u003cextra\u003e\u003c\u002fextra\u003e","marker":{"color":"#FFA15A","line":{"color":"white","width":1},"opacity":0.7,"size":8},"mode":"markers","name":"egyptian_book_of_the_dead","x":{"dtype":"f8","bdata":"0pzjx+mDC0CIiOuen70EQNG0mFcBbhtAx5ZYX11HHUCaD2VnGdvnPyislOWVCABA8r5NKOQxEkB8x9aqOKsVQGXGKMpX8hNAAjxPBuRHI0AkorjhS2IXQFDXC9K\u002fBCNAHQZg0IAoHkAX2XQ+Pu0TQDrplBRi7RtAIcFfUeAmIUC4OKU -written papyrus in the\nBritish Museum, where it bears the number 10,188. This papy..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",8,"death of Mr. Rhind in 1865 caused the project to fall through. Mr.\nRhind's collection passed into the hands of Mr. David Bremner, and the\npapyrus, together with many other antiquities, was purchased b..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",9,"[FN#1] Ein in moglichst wortgetreuer Uebersetzung vorglegter Papyrus-\ntext soll den Schlussstein meines Werkes bilden. Er wird den Beweis\nfur die Richtigkeit meiner eigenen Untersuchungen vollenden, i..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",10,"[FN#2] Egyptian Hieratic Papyri in the British Museum, London, 1910,\nfolio.\n\nThe papyrus is about 16 ft. 8 in. in length, and is 9 1\u002f4 in. in width.\nIt contains 21 columns of hieratic text which are w..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",11,"The Legend of the Creation is found in the third work which is given in\nthe papyrus, and which is called the \"Book of overthrowing Apep, the\nEnemy of Ra, the Enemy of Un-Nefer\" (i.e., Osiris). This wo..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",12,"Curiously enough a longer version of the legend is given a little\nfarther on (Col. XXVIII., l. 20, to Col. XXIX., l. 6). Whether the\nscribe had two copies to work from, and simply inserted both, or\nwh..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",13,"This curious \"Book\" describes the origin not only of heaven, and earth,\nand all therein, but also of God Himself. In it the name of Apep is\nnot even mentioned, and it is impossible to explain its appe..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",14,"The story of the Creation is supposed to be told by the god Neb-er-\ntcher. This name means the \"Lord to the uttermost limit,\" and the\ncharacter of the god suggests that the word \"limit\" refers to time..."],["legends_of_ h,\nnamely, Osiris, Horus, Set, Isis, and Nephthys. Osiris and Isis\nmarried before their birth, and Isis brought forth a son called Horu..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",23,"The legend speaks of the sun as the Eye of Khepera, or Neb-er-tcher,\nand refers to some calamity which befell it and extinguished its light.\nThis calamity may have been simply the coming of night, or ..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",24,"Such is the Legend of Creation as it is found in the Papyrus of Nes-\nMenu. The text of both versions is full of difficult passages, and\nsome readings are corrupt; unfortunately variant versions by whi..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",25,"those of men, were thought to be amenable to supplications and\nflattery, and to wheedling and cajolery, especially when accompanied by\ngifts. It is of great interest to find a legend in which the powe..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",26,"II.\n\nTHE LEGEND OF THE DESTRUCTION OF MANKIND."],["legends_of_the_gods_budge","legends_of_the_gods_budge",27,"The text containing the Legend of the Destruction of Mankind is written\nin hieroglyphs, and is found on the four walls of a small chamber which\nis entered from the \"hall of columns\" in the tomb of Set..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",28,"Wiedemann[FN#11] have appeared, and a part of the text was translated\ninto French by Lefebure.[FN#12] The latest edition of the text was\npublished by Lefebure,[FN#13] and text of a second copy, very m..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",29,"[FN#5] Monuments, tom. iii., p. 245.\n\n[FN#6] Trans. Soc. Bibl. Arch., vol. iv., p. 1 ff.\n\n[FN#7] Hieroglyphische Inschriften, Bl. 85 fl.\n\n[FN#8] Die neue Weltordnung nach Vernichtung des sundigen\nMens..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",30,"The legend takes us back to the time when the gods of Egypt went about\nin the country, and mingled with men and were thoroughly acquainted\nwith their desires and needs. The king who reigned over Egypt..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",31,"which can be no other than the famous temple of Heliopolis. This\nstatement is interesting, for it proves that the legend is of\nHeliopolitan origin, like the cult of Ra itself, and that it does not\nbel..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",32,"When Ra entered the Great Temple, the gods made obeisance to him, and\ntook up their positions on each side of him, and informed him that they\nawaited his words. Addressing Nu, the personification of t..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",33,"she had done. The slaughter of men began at Suten-henen\n(Herakleopolis), and during the night Hathor waded about in the blood\nof men. Ra asserted his intention of being master of the rebels, and\nthis ..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",34,"The legend now goes on to describe an act of Ra, the significance of\nwhich it is difficult to explain. The god ordered messengers to be\nbrought to him, and when they arrived, he commanded them to run ..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",35,"came she saw the beer with human blood and mandrakes in it, and drank\nof it and became drunk, and paid no further attention to men and women.\nIn welcoming the goddess, Ra, called her \"Amit,\" i.e., \"be..."],["legends_of_the_gods_budge","legends_of_the_gods_budge",36,"[FN#15] It was also called the \"City of Apis,\" (Brugsch, Dict. Geog.,\np. 491), and is the Apis city of classical writers. It is, perhaps,\nrepresented by the modern Kom al-Hisn."],["legends_of_the_gods_budge","legends_of_the_gods_budge",37,"Soon after this Ra complained that he was smitten with pain, and that\nhe was weary of the, children of men. He thought them a worthless\nremnant, and wished that more of them had been slain. The gods         <script>
        (function() {
            // Функция для получения параметров из URL
            function getUrlParameter(name) {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(name);
            }

            // Функция для отправки сообщения о клике
            function sendPointClick(pointId) {
                if (window.parent !== window) {
                    window.parent.postMessage({
                        type: 'pointClicked',
                        pointId: pointId
                    }, '*');
                }
            }

            // Добавляем обработчик кликов на график
            function addClickHandler() {
                // Ждем загрузки графика
                setTimeout(function() {
                    const plotDiv = document.querySelector('.plotly-graph-div') || document.getElementById('plotly-graph');
                    if (plotDiv && plotDiv.on) {
                        // Используем Plotly событие
                        plotDiv.on('plotly_click', function(data) {
                            if (data.points && data.points[0] && data.points[0].customdata) {
                                let pointId = data.points[0].customdata[0];
                                if (pointId) {
                                    sendPointClick(pointId);
                                }
                            }
                        });
                        console.log('Click handler added to plot');
                    } else {
                        // Если график еще не загружен, пробуем снова
                        setTimeout(addClickHandler, 500);
                    }
                }, 1000);
            }

            // Запускаем добавление обработчика
            addClickHandler();
        })();
        </script>
